<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق رتّل للمتابعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --primary: #10b981; /* زمردي مشرق */
            --primary-dark: #047857; 
            --gold-main: #fbbf24; /* ذهبي مضيء */
            --gold-bg: rgba(251, 191, 36, 0.1); 
            --bg-page: #020617; /* أسود ليلي/كحلي غامق */
            --card-bg: #0f172a; /* كرت رمادي غامق */
            --text-main: #f8fafc; /* أبيض ساطع للنص الأساسي */
            --text-muted: #94a3b8; /* رمادي فاتح للنص الثانوي */
            --border-dark: #334155; /* حدود داكنة */
            
            /* ألوان التقييمات */
            --tajweed-green: #22c55e; 
            --tashkeel-red: #ef4444; 
            --hifz-yellow: #eab308; 
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg-page);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(251, 191, 36, 0.05) 0px, transparent 50%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-main);
        }

        .app-container { 
            max-width: 500px; width: 100%; 
            background: var(--card-bg);
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            overflow: hidden; 
            border: 1px solid var(--border-dark);
        }

        header { 
            background: linear-gradient(135deg, #022c22, #064e3b); 
            color: white; padding: 35px 20px 25px; text-align: center;
            border-bottom: 4px solid var(--gold-main);
            position: relative;
        }

        header h1 { 
            font-family: 'Amiri Quran', serif; margin: 0; font-size: 44px; 
            text-shadow: 0 4px 6px rgba(0,0,0,0.4);
            color: var(--gold-main);
        }
        
        header p { 
            color: var(--text-main); margin: 10px 0 0 0; font-size: 18px; 
            font-family: 'Amiri Quran', serif; opacity: 0.9;
        }

        .content { padding: 30px 25px; }
        
        label { 
            display: block; margin-top: 20px; margin-bottom: 8px;
            font-weight: 700; color: var(--primary); font-size: 15px; 
        }

        input, textarea, select { 
            width: 100%; padding: 14px 16px; 
            border: 2px solid var(--border-dark); 
            border-radius: 12px; font-family: 'Tajawal'; box-sizing: border-box; 
            background: #1e293b; color: var(--text-main); font-size: 15px;
            outline: none; transition: all 0.3s ease;
            font-weight: 500;
        }
        
        input:focus, textarea:focus, select:focus { 
            border-color: var(--primary); 
            background: #0f172a; 
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        /* تعديل ألوان الـ Datalist لتكون متوافقة مع الوضع الداكن في المتصفحات المدعومة */
        input::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .range-container { display: flex; gap: 15px; }

        .quran-box { 
            background: #020617; border: 2px dashed var(--border-dark); 
            padding: 25px; border-radius: 16px; margin-top: 15px; 
            min-height: 140px; max-height: 350px; overflow-y: auto; text-align: center; line-height: 2.5; 
            font-family: 'Amiri Quran', serif; font-size: 26px; color: var(--text-main);
            transition: all 0.3s ease; box-shadow: inset 0 4px 12px rgba(0,0,0,0.3);
        }
        .quran-box:hover { border-color: var(--gold-main); }

        .word { display: inline-block; margin: 0 2px; padding: 2px 4px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .word:hover { background-color: rgba(255,255,255,0.05); }
        .t-1 { background-color: var(--tajweed-green) !important; color: #000 !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); } 
        .t-2 { background-color: var(--tashkeel-red) !important; color: #fff !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); } 
        .t-3 { background-color: var(--hifz-yellow) !important; color: #000 !important; box-shadow: 0 0 10px rgba(234, 179, 8, 0.4); } 

        .ayah-icon { 
            cursor: pointer; font-size: 18px; margin: 0 6px; 
            transition: all 0.2s; display: inline-block; opacity: 0.7;
        }
        .ayah-icon:hover { transform: translateY(-3px) scale(1.1); opacity: 1; }

        .legend-box {
            background: #1e293b; border: 1px solid var(--border-dark);
            padding: 12px; border-radius: 12px; margin-top: 15px;
            text-align: center; font-size: 13px; font-weight: bold; color: var(--text-muted);
            line-height: 1.8;
        }

        .btn-add-surah {
            background: rgba(251, 191, 36, 0.05); border: 2px dashed var(--gold-main);
            color: var(--gold-main); width: 100%; padding: 14px; border-radius: 12px;
            cursor: pointer; font-weight: bold; margin-top: 25px; font-family: 'Tajawal';
            font-size: 16px; transition: all 0.3s;
        }
        .btn-add-surah:hover { background: var(--gold-main); color: #000; transform: translateY(-2px); }

        .summary-box { 
            background: #022c22; border-right: 4px solid var(--primary); 
            padding: 15px; border-radius: 12px; margin-top: 15px; 
            border: 1px solid #064e3b; border-right-width: 4px;
        }
        .summary-box ul { padding-right: 20px; margin: 8px 0 0 0; font-size: 14px; color: var(--text-main); }
        .summary-box li { margin-bottom: 5px; }

        .btn-send { 
            background: linear-gradient(135deg, var(--primary-dark), var(--primary)); 
            color: white; border: none; padding: 18px; border-radius: 16px; 
            width: 100%; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 30px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); font-family: 'Tajawal';
            transition: all 0.3s ease; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-send:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3); }

        /* نافذة التفسير المنبثقة */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: var(--card-bg); padding: 30px; border-radius: 24px; max-width: 90%; width: 420px; 
            text-align: right; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; border: 1px solid var(--border-dark);
        }
        .close-btn { 
            background: #1e293b; color: var(--text-muted); border: 1px solid var(--border-dark); padding: 8px 12px; border-radius: 10px; 
            cursor: pointer; position: absolute; left: 20px; top: 20px; font-family: 'Tajawal'; font-weight: bold; transition: 0.2s;
        }
        .close-btn:hover { background: var(--tashkeel-red); color: white; border-color: var(--tashkeel-red); }
        .tafsir-text { margin-top: 20px; font-size: 16px; line-height: 1.9; color: var(--text-main); }
        
        #lastLessonNote {
            color: var(--gold-main); font-size: 13px; margin-top: 8px; 
            background: rgba(251, 191, 36, 0.1); padding: 10px; border-radius: 10px; 
            border-right: 3px solid var(--gold-main);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>رتّل</h1>
        <p>خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ</p>
    </header>

    <div class="content">
        <label>👤 اسم الطالب:</label>
        <input type="text" id="studentName" list="studentsList" placeholder="أدخل اسم الطالب..." oninput="checkStudentSelection()" autocomplete="off">
        <datalist id="studentsList"></datalist>
        <div id="lastLessonNote" style="display:none;"></div>

        <label>📖 ابحث عن السورة:</label>
        <div style="position:relative">
            <input type="text" id="surahSearch" list="surahsData" placeholder="اكتب الفلق، البقرة..." oninput="checkSurahSelection()">
            <datalist id="surahsData"></datalist>
        </div>

        <div id="rangeSelector" style="display:none">
            <div class="range-container">
                <div style="flex:1">
                    <label>من آية:</label>
                    <select id="startAyah" onchange="updateView()"></select>
                </div>
                <div style="flex:1">
                    <label>إلى آية:</label>
                    <select id="endAyah" onchange="updateView()"></select>
                </div>
            </div>
        </div>

        <div id="quranContainer" class="quran-box" onclick="handleInteraction(event)">
            <span style="color:var(--text-muted); font-size: 20px;">اختر سورة لبدء التسميع..</span>
        </div>
        
        <div class="legend-box">
            ضغطة: <span style="color:var(--tajweed-green)">🟢 تجويد</span> | ضغطتان: <span style="color:var(--tashkeel-red)">🔴 تشكيل</span> | 3 ضغطات: <span style="color:var(--hifz-yellow)">🟡 حفظ</span>
            <br><span style="color:var(--gold-main); font-size: 12px; font-weight: normal; opacity: 0.8;">(اضغط على 📖 للتفسير | واضغط على 🔊 للاستماع)</span>
        </div>

        <label>⭐ تقييم التسميع:</label>
        <select id="surahEvaluation">
            <option value="ممتاز">ممتاز</option>
            <option value="جيد جدا">جيد جدا</option>
            <option value="جيد">جيد</option>
            <option value="مقبول">مقبول</option>
            <option value="إعادة">إعادة</option>
        </select>

        <button class="btn-add-surah" onclick="addSurahToSession()">➕ إضافة هذه السورة للتقرير</button>

        <div id="sessionSummary" class="summary-box" style="display:none;">
            <label style="margin-top: 0; color: var(--primary);">السور التي تم تسميعها:</label>
            <ul id="surahList"></ul>
        </div>

        <label>📝 ملاحظات إضافية:</label>
        <textarea id="notes" rows="2" placeholder="اكتب ملاحظاتك هنا..."></textarea>

        <label>📚 وظيفة الدرس القادم:</label>
        <input type="text" id="nextLesson" placeholder="مثال: مراجعة سورة البقرة">

        <button class="btn-send" onclick="finalSend()">إرسال التقرير النهائي 🚀</button>
    </div>
</div>

<!-- نافذة التفسير -->
<div id="tafsirModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeTafsir()">✖ إغلاق</button>
        <h3 id="tafsirTitle" style="color: var(--primary); margin-top: 0; font-family: 'Amiri Quran', serif;">التفسير الميسر</h3>
        <div id="tafsirBody" class="tafsir-text">جاري التحميل...</div>
    </div>
</div>

<script>
let allSurahs = [], currentAyahs = [], currentTafsirAyahs = [], sessionData = [];
let currentSurahName = "";
let currentAudio = null; 

let studentsData = JSON.parse(localStorage.getItem('rattal_students')) || {};

function updateStudentsList() {
    const datalist = document.getElementById("studentsList");
    datalist.innerHTML = Object.keys(studentsData).map(name => `<option value="${name}">`).join("");
}
updateStudentsList(); 

function checkStudentSelection() {
    const name = document.getElementById("studentName").value;
    const noteDiv = document.getElementById("lastLessonNote");
    if (studentsData[name] && studentsData[name].lastLesson) {
        noteDiv.innerHTML = `📌 <b>الواجب السابق:</b> ${studentsData[name].lastLesson}`;
        noteDiv.style.display = "block";
    } else {
        noteDiv.style.display = "none";
    }
}

function cleanSurahName(name) {
    return name
        .replace(/[\u0617-\u061A\u064B-\u0652\u0670]/g, "") 
        .replace(/سُورَةُ /g, "") 
        .replace(/سورة /g, "") 
        .replace(/ٱ/g, "ا") 
        .replace(/[أإآ]/g, "ا"); 
}

const playSound = (freq) => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine"; osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0.05, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
};

async function fetchSurahs() {
  const res = await fetch("https://api.alquran.cloud/v1/surah");
  const data = await res.json();
  
  allSurahs = data.data.map(surah => ({
      ...surah,
      cleanName: cleanSurahName(surah.name)
  }));
  
  const datalist = document.getElementById("surahsData");
  datalist.innerHTML = allSurahs.map(s => `<option value="${s.cleanName}">`).join("");
}
fetchSurahs();

function checkSurahSelection() {
  const val = document.getElementById("surahSearch").value;
  const foundSurah = allSurahs.find(s => s.cleanName === val);
  
  if(foundSurah) {
      selectSurah(foundSurah.number, foundSurah.name);
  }
}

async function selectSurah(num, name) {
  currentSurahName = name;

  const [resQuran, resTafsir] = await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${num}`),
      fetch(`https://api.alquran.cloud/v1/surah/${num}/ar.muyassar`)
  ]);

  const dataQuran = await resQuran.json();
  const dataTafsir = await resTafsir.json();
  
  currentAyahs = dataQuran.data.ayahs;
  currentTafsirAyahs = dataTafsir.data.ayahs;

  const startSelect = document.getElementById("startAyah");
  const endSelect = document.getElementById("endAyah");
  const options = currentAyahs.map((a) => `<option value="${a.numberInSurah}">${a.numberInSurah}</option>`).join("");
  startSelect.innerHTML = options; endSelect.innerHTML = options;
  endSelect.value = currentAyahs.length;

  document.getElementById("rangeSelector").style.display = "block";
  updateView();
}

function updateView() {
  const start = parseInt(document.getElementById("startAyah").value) - 1;
  const end = parseInt(document.getElementById("endAyah").value);
  const container = document.getElementById("quranContainer");

  let html = "";
  currentAyahs.slice(start, end).forEach((ayah) => {
    ayah.text.split(" ").forEach((w) => { if(w) html += `<span class="word">${w}</span> ` });
    html += `<span style="color:var(--gold-main); font-family:'Tajawal'; font-size:16px;"> ﴿${ayah.numberInSurah}﴾ <span class="ayah-icon" title="عرض التفسير" onclick="showTafsir(${ayah.numberInSurah - 1})">📖</span><span class="ayah-icon" title="استماع للآية" onclick="playAyahAudio(${ayah.number})">🔊</span></span> `;
  });
  container.innerHTML = html;
}

function playAyahAudio(absoluteAyahNumber) {
    if (currentAudio) {
        currentAudio.pause(); 
    }
    currentAudio = new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${absoluteAyahNumber}.mp3`);
    currentAudio.play();
}

function handleInteraction(e) {
  if (e.target.classList.contains("word")) {
    const el = e.target;
    if (el.classList.contains("t-1")) {
      el.classList.replace("t-1", "t-2"); playSound(600); 
    } else if (el.classList.contains("t-2")) {
      el.classList.replace("t-2", "t-3"); playSound(500); 
    } else if (el.classList.contains("t-3")) {
      el.classList.remove("t-3"); playSound(300); 
    } else {
      el.classList.add("t-1"); playSound(440); 
    }
  }
}

function showTafsir(index) {
    if(!currentTafsirAyahs[index]) return;
    const tafsirText = currentTafsirAyahs[index].text;
    const ayahNum = index + 1;
    
    document.getElementById("tafsirTitle").innerText = `الآية ﴿${ayahNum}﴾`;
    document.getElementById("tafsirBody").innerText = tafsirText;
    document.getElementById("tafsirModal").style.display = "flex";
}

function closeTafsir() {
    document.getElementById("tafsirModal").style.display = "none";
}

function getWordWithContext(element) {
  let prev = element.previousElementSibling;
  let next = element.nextElementSibling;
  
  let prevText = (prev && prev.classList.contains("word")) ? prev.innerText.trim() : "";
  let nextText = (next && next.classList.contains("word")) ? next.innerText.trim() : "";
  let currentText = element.innerText.trim();
  
  let result = "";
  if (prevText) result += prevText + " ";
  result += "(" + currentText + ")";
  if (nextText) result += " " + nextText;
  
  return result;
}

function addSurahToSession() {
  if (!currentSurahName) return alert("الرجاء اختيار سورة أولاً.");
  const start = document.getElementById("startAyah").value;
  const end = document.getElementById("endAyah").value;
  const evaluation = document.getElementById("surahEvaluation").value; 

  sessionData.push({
    name: currentSurahName, range: `الآيات ${start}-${end}`,
    evaluation: evaluation, 
    errors: {
      tajweed: Array.from(document.querySelectorAll(".t-1")).map(w => getWordWithContext(w)),
      tashkeel: Array.from(document.querySelectorAll(".t-2")).map(w => getWordWithContext(w)),
      hifz: Array.from(document.querySelectorAll(".t-3")).map(w => getWordWithContext(w))
    }
  });

  const summaryBox = document.getElementById("sessionSummary");
  const list = document.getElementById("surahList");
  summaryBox.style.display = "block";
  list.innerHTML = sessionData.map((s) => `<li>✔️ ${s.name} (${s.range}) - <b style="color:var(--gold-main)">[${s.evaluation}]</b></li>`).join("");

  document.getElementById("surahSearch").value = "";
  document.getElementById("rangeSelector").style.display = "none";
  document.getElementById("quranContainer").innerHTML = "<span style='color:var(--tajweed-green); font-size: 20px;'>تم الحفظ بنجاح! ✅</span><br><span style='color:var(--text-muted); font-size: 16px;'>اختر سورة أخرى أو أرسل التقرير.</span>";
  document.getElementById("surahEvaluation").value = "ممتاز"; 
  currentSurahName = "";
  if(currentAudio) { currentAudio.pause(); currentAudio = null; } 
}

function finalSend() {
  const name = document.getElementById("studentName").value;
  const notes = document.getElementById("notes").value || "لا يوجد";
  const next = document.getElementById("nextLesson").value || "مراجعة الاخطاء ومتابعة الحفظ";

  if (!name || sessionData.length === 0) return alert("أدخل اسم الطالب وأضف سورة واحدة على الأقل.");

  studentsData[name] = { lastLesson: next };
  localStorage.setItem('rattal_students', JSON.stringify(studentsData));
  updateStudentsList(); 
  
  confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#10b981', '#fbbf24', '#ffffff'] });

  let msg = `*✨ تقرير حلقة القرآن الكريم ✨*%0a--------------------%0a*👤 الطالب:* ${name}%0a%0a*📖 السور المسمّعة:*%0a`;

  sessionData.forEach((s, index) => {
    msg += `%0a*${index + 1}️⃣ ${s.name}* (${s.range})%0a*التقييم:* ${s.evaluation}%0a`;
    if (s.errors.tashkeel.length > 0) msg += `🔴 تشكيل: ${s.errors.tashkeel.join("، ")}%0a`;
    if (s.errors.hifz.length > 0) msg += `🟡 حفظ: ${s.errors.hifz.join("، ")}%0a`;
    if (s.errors.tajweed.length > 0) msg += `🟢 تجويد: ${s.errors.tajweed.join("، ")}%0a`;
  });

  msg += `%0a--------------------%0a*📚 الواجب القادم:* ${next}%0a*📝 ملاحظات:* ${notes}%0a--------------------%0a*بارك الله فيكم*`;
  
  setTimeout(() => {
    window.open(`https://api.whatsapp.com/send?text=${msg}`, "_blank");
  }, 800);

  document.getElementById("studentName").value = ""; 
  document.getElementById("notes").value = ""; 
  document.getElementById("nextLesson").value = "";
  document.getElementById("sessionSummary").style.display = "none";
  document.getElementById("surahEvaluation").value = "ممتاز";
  document.getElementById("quranContainer").innerHTML = "<span style='color:var(--text-muted); font-size: 20px;'>اختر سورة لبدء التسميع..</span>";
  document.getElementById("lastLessonNote").style.display = "none";
  sessionData = []; 
  if(currentAudio) { currentAudio.pause(); currentAudio = null; } 
}
</script>
</body>
</html>
